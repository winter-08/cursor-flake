name: Cursor Version Bump

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: cursor-version-bump
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v17

      - name: Update pinned Cursor sources
        run: |
          nix shell \
            nixpkgs#bash \
            nixpkgs#curl \
            nixpkgs#jq \
            nixpkgs#coreutils \
            nixpkgs#nix \
            nixpkgs#_7zz \
            -c bash ./update.sh

      - name: Detect version bump
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- sources.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version="$(jq -r '.version' sources.json)"
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: ci/cursor-${{ steps.changes.outputs.version }}
          delete-branch: true
          commit-message: "chore: bump Cursor to ${{ steps.changes.outputs.version }}"
          title: "chore: bump Cursor to ${{ steps.changes.outputs.version }}"
          body: |
            Automated daily Cursor version bump.

            Changes:
            - refresh pinned upstream download URLs
            - refresh fixed-output hashes in `sources.json`
          add-paths: |
            sources.json
